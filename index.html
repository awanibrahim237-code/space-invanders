<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Space Invaders — Muhammad Ibrahim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #04000f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      user-select: none;
    }
    #title-bar {
      color: #ff00ff;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 8px;
    }
    canvas {
      border: 1px solid rgba(255,0,255,0.15);
      border-radius: 10px;
      box-shadow: 0 0 40px #330033, 0 0 80px #110011;
      display: block;
      max-width: 100%;
    }
    #controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      background: linear-gradient(135deg, #0d0010, #06000a);
      border: 1px solid rgba(255,0,255,0.2);
      color: #cc00ff;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 12px;
      padding: 9px 16px;
      border-radius: 6px;
      cursor: pointer;
      min-width: 58px;
      touch-action: none;
    }
    .btn.fire {
      background: linear-gradient(135deg, #110022, #080011);
      border-color: rgba(255,0,255,0.35);
      color: #ff00ff;
    }
    #hint { color: #332244; font-size: 10px; margin-top: 6px; }
    #credit {
      color: #221133;
      font-size: 10px;
      margin-top: 6px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div id="title-bar">Space Invaders · Muhammad Ibrahim</div>
<canvas id="c" width="620" height="520"></canvas>
<div id="controls">
  <button class="btn" id="bL">◀ LEFT</button>
  <button class="btn fire" id="bF">▶ START</button>
  <button class="btn" id="bR">RIGHT ▶</button>
</div>
<div id="hint">← → Arrow Keys to move · SPACE to shoot</div>
<div id="credit">Built by Muhammad Ibrahim · Thanks to Sir Fahad Qureshi</div>

<script>

// ── CLASS 1: Vector2 ──────────────────────────────────────
class Vector2 {
  constructor(x=0,y=0){this.x=x;this.y=y;}
  add(v){return new Vector2(this.x+v.x,this.y+v.y);}
  clone(){return new Vector2(this.x,this.y);}
}

// ── CLASS 2: GameObject (Base Class) ─────────────────────
class GameObject {
  constructor(x,y,w,h){
    this.pos=new Vector2(x,y);
    this.width=w; this.height=h; this.alive=true;
  }
  cx(){return this.pos.x+this.width/2;}
  cy(){return this.pos.y+this.height/2;}
  getBounds(){
    return{l:this.pos.x,r:this.pos.x+this.width,
           t:this.pos.y,b:this.pos.y+this.height};
  }
  collidesWith(o){
    const a=this.getBounds(),b=o.getBounds();
    return a.l<b.r&&a.r>b.l&&a.t<b.b&&a.b>b.t;
  }
}

// ── CLASS 3: Bullet ───────────────────────────────────────
class Bullet extends GameObject {
  constructor(x,y,speed,fromPlayer){
    super(x,y,4,14);
    this.speed=speed; this.fromPlayer=fromPlayer;
  }
  update(H){
    this.pos.y+=this.fromPlayer?-this.speed:this.speed;
    if(this.pos.y<-20||this.pos.y>H+20)this.alive=false;
  }
  draw(ctx){
    const[c1,c2,glow]=this.fromPlayer
      ?["#ffffff","#00eeff","#00ccff"]
      :["#ff4444","#ff0080","#ff0044"];
    const g=ctx.createLinearGradient(this.cx(),this.pos.y,this.cx(),this.pos.y+this.height);
    g.addColorStop(0,c1); g.addColorStop(1,c2);
    ctx.fillStyle=g;
    ctx.shadowColor=glow; ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.roundRect(this.pos.x,this.pos.y,this.width,this.height,3);
    ctx.fill(); ctx.shadowBlur=0;
  }
}

// ── CLASS 4: Player ───────────────────────────────────────
class Player extends GameObject {
  constructor(W,H){
    super(W/2-22,H-70,44,32);
    this.W=W; this.speed=5; this.lives=3;
    this.cooldown=0; this.invincible=0; this.thrustT=0;
  }
  update(keys){
    if(keys["ArrowLeft"]||keys["a"])this.pos.x-=this.speed;
    if(keys["ArrowRight"]||keys["d"])this.pos.x+=this.speed;
    this.pos.x=Math.max(0,Math.min(this.W-this.width,this.pos.x));
    if(this.cooldown>0)this.cooldown--;
    if(this.invincible>0)this.invincible--;
    this.thrustT+=0.3;
  }
  shoot(){
    if(this.cooldown>0)return null;
    this.cooldown=16;
    return new Bullet(this.cx(),this.pos.y,10,true);
  }
  hit(){
    if(this.invincible>0)return false;
    this.lives--; this.invincible=90; return this.lives<=0;
  }
  draw(ctx){
    if(this.invincible>0&&Math.floor(this.invincible/6)%2===0)return;
    const cx=this.cx();
    const fh=10+Math.sin(this.thrustT)*5;
    const fg=ctx.createLinearGradient(cx,this.pos.y+this.height,cx,this.pos.y+this.height+fh+6);
    fg.addColorStop(0,"#ffffff"); fg.addColorStop(0.3,"#00eeff"); fg.addColorStop(1,"rgba(0,100,255,0)");
    ctx.fillStyle=fg; ctx.shadowColor="#00eeff"; ctx.shadowBlur=14;
    ctx.beginPath();
    ctx.moveTo(cx-6,this.pos.y+this.height);
    ctx.lineTo(cx,this.pos.y+this.height+fh+6);
    ctx.lineTo(cx+6,this.pos.y+this.height);
    ctx.fill();
    const bg=ctx.createLinearGradient(cx,this.pos.y,cx,this.pos.y+this.height);
    bg.addColorStop(0,"#aaddff"); bg.addColorStop(1,"#0055cc");
    ctx.fillStyle=bg; ctx.shadowColor="#00ccff"; ctx.shadowBlur=20;
    ctx.beginPath();
    ctx.moveTo(cx,this.pos.y);
    ctx.lineTo(this.pos.x+this.width,this.pos.y+this.height);
    ctx.lineTo(cx+6,this.pos.y+this.height-8);
    ctx.lineTo(cx-6,this.pos.y+this.height-8);
    ctx.lineTo(this.pos.x,this.pos.y+this.height);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#ccffff"; ctx.shadowColor="#ffffff"; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.ellipse(cx,this.pos.y+14,5,7,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

// ── CLASS 5: Enemy ────────────────────────────────────────
class Enemy extends GameObject {
  constructor(x,y,type){
    const s=[38,34,30][type]||30;
    super(x,y,s,s);
    this.type=type; this.points=[30,20,10][type]||10;
    this.animT=Math.random()*Math.PI*2;
    this.shotCd=60+Math.floor(Math.random()*120);
  }
  update(){this.animT+=0.05; if(this.shotCd>0)this.shotCd--;}
  canShoot(){
    if(this.shotCd<=0){this.shotCd=80+Math.floor(Math.random()*100);return true;}
    return false;
  }
  shoot(){return new Bullet(this.cx(),this.pos.y+this.height,4,false);}
  draw(ctx){
    const bob=Math.sin(this.animT)*2;
    const pal=[
      {body:"#ff6600",wing:"#cc3300",eye:"#ffcc00",glow:"#ff8800"},
      {body:"#cc00ff",wing:"#8800cc",eye:"#ff88ff",glow:"#dd00ff"},
      {body:"#00ff88",wing:"#007744",eye:"#aaffdd",glow:"#00ff99"},
    ][this.type]||{body:"#f00",wing:"#800",eye:"#fff",glow:"#f00"};
    ctx.shadowColor=pal.glow; ctx.shadowBlur=16;
    const bg=ctx.createLinearGradient(this.cx(),this.pos.y+bob,this.cx(),this.pos.y+this.height+bob);
    bg.addColorStop(0,pal.body); bg.addColorStop(1,pal.wing);
    ctx.fillStyle=bg;
    if(this.type===0){
      ctx.beginPath();
      ctx.ellipse(this.cx(),this.cy()+bob,this.width*0.38,this.height*0.28,0,0,Math.PI*2);
      ctx.fill();
      [[-1,1],[1,1],[-1,-0.3],[1,-0.3]].forEach(([sx,sy])=>{
        ctx.beginPath();
        ctx.ellipse(this.cx()+sx*this.width*0.42,this.cy()+sy*8+bob,7,5,sx*0.4,0,Math.PI*2);
        ctx.fill();
      });
    } else if(this.type===1){
      ctx.beginPath();
      ctx.ellipse(this.cx(),this.cy()+bob,this.width*0.36,this.height*0.32,0,0,Math.PI*2);
      ctx.fill();
      for(let i=-2;i<=2;i++){
        ctx.fillStyle=i%2===0?pal.body:pal.wing;
        ctx.beginPath();
        ctx.ellipse(this.cx()+i*6,this.cy()+this.height*0.3+bob,3,7,0,0,Math.PI*2);
        ctx.fill();
      }
    } else {
      ctx.beginPath();
      ctx.ellipse(this.cx(),this.cy()+bob,this.width*0.34,this.height*0.34,0,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle=pal.body; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(this.cx()-6,this.cy()-this.height*0.3+bob);
      ctx.lineTo(this.cx()-12,this.cy()-this.height*0.55+bob);
      ctx.moveTo(this.cx()+6,this.cy()-this.height*0.3+bob);
      ctx.lineTo(this.cx()+12,this.cy()-this.height*0.55+bob);
      ctx.stroke();
    }
    ctx.fillStyle=pal.eye; ctx.shadowColor="#fff"; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(this.cx()-6,this.cy()-3+bob,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(this.cx()+6,this.cy()-3+bob,3.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

// ── CLASS 6: EnemySwarm ───────────────────────────────────
class EnemySwarm {
  constructor(W){
    this.W=W; this.direction=1; this.speed=0.8;
    this.dropAmt=22; this.enemies=[]; this._build();
  }
  _build(){
    const cols=10,gapX=56,gapY=50,startX=60,startY=60;
    [[0,1],[1,2],[2,4]].forEach(([type,rows])=>{
      for(let r=0;r<rows;r++){
        const row=(type===0?0:type===1?1:3)+r;
        for(let c=0;c<cols;c++){
          this.enemies.push(new Enemy(startX+c*gapX,startY+row*gapY,type));
        }
      }
    });
  }
  alive(){return this.enemies.filter(e=>e.alive);}
  update(){
    const living=this.alive();
    if(!living.length)return[];
    living.forEach(e=>e.update());
    const minX=Math.min(...living.map(e=>e.pos.x));
    const maxX=Math.max(...living.map(e=>e.pos.x+e.width));
    if(maxX>=this.W-10||minX<=10){
      this.direction*=-1;
      living.forEach(e=>{e.pos.y+=this.dropAmt;});
      this.speed=Math.min(this.speed+0.08,4);
    }
    living.forEach(e=>{e.pos.x+=this.speed*this.direction;});
    const bullets=[];
    const cols={};
    living.forEach(e=>{
      const col=Math.round(e.pos.x/56);
      if(!cols[col]||e.pos.y>cols[col].pos.y)cols[col]=e;
    });
    Object.values(cols).forEach(e=>{
      if(e.canShoot()&&Math.random()<0.015)bullets.push(e.shoot());
    });
    return bullets;
  }
  draw(ctx){this.enemies.filter(e=>e.alive).forEach(e=>e.draw(ctx));}
}

// ── CLASS 7: Star ─────────────────────────────────────────
class Star {
  constructor(W,H){this.W=W;this.H=H;this.reset(true);}
  reset(init=false){
    this.x=Math.random()*this.W;
    this.y=init?Math.random()*this.H:0;
    this.size=Math.random()*2+0.3;
    this.speed=Math.random()*1.2+0.2;
    this.alpha=Math.random()*0.7+0.3;
  }
  update(){this.y+=this.speed;if(this.y>this.H)this.reset();}
  draw(ctx){
    ctx.globalAlpha=this.alpha;
    ctx.fillStyle="#ffffff";
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ── CLASS 8: Explosion ────────────────────────────────────
class Explosion {
  constructor(x,y,color){
    this.x=x;this.y=y;this.color=color;
    this.particles=Array.from({length:12},()=>({
      vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,
      life:1,size:Math.random()*4+2
    }));
    this.alive=true;
  }
  update(){
    this.particles.forEach(p=>{
      p.x=(p.x||0)+p.vx;p.y=(p.y||0)+p.vy;
      p.life-=0.05;p.vx*=0.95;p.vy*=0.95;
    });
    if(this.particles.every(p=>p.life<=0))this.alive=false;
  }
  draw(ctx){
    this.particles.forEach(p=>{
      if(p.life<=0)return;
      ctx.globalAlpha=p.life;
      ctx.fillStyle=this.color;
      ctx.shadowColor=this.color;ctx.shadowBlur=8;
      ctx.beginPath();
      ctx.arc(this.x+(p.x||0),this.y+(p.y||0),p.size*p.life,0,Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

// ── CLASS 9: GameEngine ───────────────────────────────────
class GameEngine {
  constructor(canvas){
    this.canvas=canvas;this.ctx=canvas.getContext("2d");
    this.W=canvas.width;this.H=canvas.height;
    this.keys={};this.state="idle";
    this.score=0;this.hiScore=0;this.wave=1;
    this.bullets=[];this.explosions=[];
    this.stars=Array.from({length:80},()=>new Star(this.W,this.H));
    this.player=null;this.swarm=null;this.frameId=null;
  }
  startGame(){
    this.score=0;this.wave=1;
    this.bullets=[];this.explosions=[];
    this.player=new Player(this.W,this.H);
    this.swarm=new EnemySwarm(this.W);
    this.state="playing";
    document.getElementById("bF").textContent="🔥 FIRE";
  }
  nextWave(){
    this.wave++;this.bullets=[];
    this.swarm=new EnemySwarm(this.W);
    this.swarm.speed=0.8+this.wave*0.15;
  }
  update(){
    this.stars.forEach(s=>s.update());
    this.explosions.forEach(e=>e.update());
    this.explosions=this.explosions.filter(e=>e.alive);
    if(this.state!=="playing")return;
    if(this.keys[" "]||this.keys["Space"]){const b=this.player.shoot();if(b)this.bullets.push(b);}
    this.player.update(this.keys);
    const eb=this.swarm.update();eb.forEach(b=>this.bullets.push(b));
    this.bullets.forEach(b=>b.update(this.H));
    this.bullets=this.bullets.filter(b=>b.alive);
    const living=this.swarm.alive();
    this.bullets.forEach(b=>{
      if(!b.fromPlayer||!b.alive)return;
      living.forEach(e=>{
        if(e.alive&&b.alive&&b.collidesWith(e)){
          b.alive=false;e.alive=false;this.score+=e.points;
          this.explosions.push(new Explosion(e.cx(),e.cy(),["#ff6600","#cc00ff","#00ff88"][e.type]));
        }
      });
    });
    this.bullets.forEach(b=>{
      if(b.fromPlayer||!b.alive)return;
      if(b.collidesWith(this.player)){
        b.alive=false;
        const dead=this.player.hit();
        this.explosions.push(new Explosion(this.player.cx(),this.player.cy(),"#00ccff"));
        if(dead){
          this.hiScore=Math.max(this.hiScore,this.score);
          this.state="gameover";
          document.getElementById("bF").textContent="↺ RESTART";
        }
      }
    });
    if(living.some(e=>e.pos.y+e.height>=this.H-60)){
      this.hiScore=Math.max(this.hiScore,this.score);
      this.state="gameover";
      document.getElementById("bF").textContent="↺ RESTART";
    }
    if(living.length===0){
      if(this.wave>=3){
        this.hiScore=Math.max(this.hiScore,this.score);
        this.state="win";
        document.getElementById("bF").textContent="↺ PLAY AGAIN";
      } else {this.nextWave();}
    }
  }
  drawBG(ctx){
    const g=ctx.createLinearGradient(0,0,0,this.H);
    g.addColorStop(0,"#00000f");g.addColorStop(1,"#050520");
    ctx.fillStyle=g;ctx.fillRect(0,0,this.W,this.H);
    this.stars.forEach(s=>s.draw(ctx));
  }
  drawHUD(ctx){
    ctx.font="bold 15px 'Courier New',monospace";
    ctx.fillStyle="#ff00ff";ctx.shadowColor="#ff00ff";ctx.shadowBlur=10;
    ctx.fillText("SCORE  "+String(this.score).padStart(6,"0"),16,28);
    ctx.fillText("HI  "+String(this.hiScore).padStart(6,"0"),this.W/2-60,28);
    ctx.fillText("WAVE  "+this.wave+"/3",this.W-110,28);
    for(let i=0;i<this.player.lives;i++){
      ctx.fillStyle="#ff00ff";ctx.shadowColor="#ff00ff";ctx.shadowBlur=8;
      ctx.beginPath();
      ctx.moveTo(16+i*28,this.H-16);ctx.lineTo(28+i*28,this.H-32);ctx.lineTo(40+i*28,this.H-16);
      ctx.closePath();ctx.fill();
    }
    ctx.shadowBlur=0;
  }
  drawOverlay(title,sub,sub2){
    const ctx=this.ctx;
    ctx.fillStyle="rgba(0,0,15,0.75)";ctx.fillRect(0,0,this.W,this.H);
    ctx.textAlign="center";
    ctx.font="bold 46px 'Courier New',monospace";
    ctx.fillStyle="#ff00ff";ctx.shadowColor="#ff00ff";ctx.shadowBlur=30;
    ctx.fillText(title,this.W/2,this.H/2-48);
    ctx.font="17px 'Courier New',monospace";
    ctx.fillStyle="#ffaaff";ctx.shadowBlur=0;
    ctx.fillText(sub,this.W/2,this.H/2+10);
    ctx.font="13px 'Courier New',monospace";
    ctx.fillStyle="#553366";
    ctx.fillText(sub2,this.W/2,this.H/2+40);
    ctx.textAlign="left";
  }
  draw(){
    const ctx=this.ctx;
    this.drawBG(ctx);
    this.explosions.forEach(e=>e.draw(ctx));
    if(this.state==="playing"||this.state==="gameover"||this.state==="win"){
      this.swarm.draw(ctx);
      this.bullets.forEach(b=>b.draw(ctx));
      this.player.draw(ctx);
      this.drawHUD(ctx);
    }
    if(this.state==="idle")
      this.drawOverlay("SPACE  INVADERS","← → or A D to move  |  SPACE to shoot","Press SPACE or tap START to begin");
    if(this.state==="gameover")
      this.drawOverlay("GAME  OVER","Score: "+this.score+"   Hi: "+this.hiScore,"Press SPACE or tap RESTART");
    if(this.state==="win")
      this.drawOverlay("YOU  WIN!","All 3 waves cleared!  Score: "+this.score,"Press SPACE or tap PLAY AGAIN");
  }
  loop(){this.update();this.draw();this.frameId=requestAnimationFrame(()=>this.loop());}
  start(){this.loop();}
  stop(){if(this.frameId)cancelAnimationFrame(this.frameId);}
  action(){if(this.state!=="playing")this.startGame();}
  fire(){if(this.state!=="playing"){this.action();return;}const b=this.player.shoot();if(b)this.bullets.push(b);}
}

// ── BOOT ──────────────────────────────────────────────────
const engine=new GameEngine(document.getElementById("c"));
engine.start();

window.addEventListener("keydown",e=>{
  engine.keys[e.key]=true;
  if(e.key===" "||e.key==="Space"){e.preventDefault();if(engine.state!=="playing")engine.action();}
});
window.addEventListener("keyup",e=>{engine.keys[e.key]=false;});

const bL=document.getElementById("bL");
const bR=document.getElementById("bR");
const bF=document.getElementById("bF");
bL.addEventListener("pointerdown",()=>engine.keys["ArrowLeft"]=true);
bL.addEventListener("pointerup",  ()=>engine.keys["ArrowLeft"]=false);
bL.addEventListener("pointerleave",()=>engine.keys["ArrowLeft"]=false);
bR.addEventListener("pointerdown",()=>engine.keys["ArrowRight"]=true);
bR.addEventListener("pointerup",  ()=>engine.keys["ArrowRight"]=false);
bR.addEventListener("pointerleave",()=>engine.keys["ArrowRight"]=false);
bF.addEventListener("pointerdown",()=>engine.fire());

</script>
</body>
</html>
